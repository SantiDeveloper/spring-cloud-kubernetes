spring.application.name=ms-users
#server.port=8001
server.port=${PORT:8001}
#spring.datasource.url=jdbc:mysql://localhost:3306/ms_users?serverTimezone=Europe/Madrid
#spring.datasource.url=jdbc:mysql://host.docker.internal:3306/ms_users?serverTimezone=Europe/Madrid
spring.datasource.url=jdbc:mysql://${DB_HOST:mysql8:3306}/${DB_DATABASE:ms_users}?serverTimezone=Europe/Madrid
#&allowPublicKeyRetrieval=false
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:admin}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.generate-ddl=true
logging.level.org.hibernate.SQL=debug

logging.file.path=/app/logs

ms.grades.url=${GRADES_URL:ms-grades:8002/api/v1/grade}