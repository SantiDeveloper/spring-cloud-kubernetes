spring.application.name=ms-grades
server.port=${PORT:8002}
#spring.datasource.url=jdbc:postgresql://localhost:5432/ms_grades
#spring.datasource.url=jdbc:postgresql://host.docker.internal:5432/ms_grades
spring.datasource.url=jdbc:postgresql://${DB_HOST:postgres14:5432}/${DB_DATABASE:ms_grades}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.generate-ddl=true
logging.level.org.hibernate.SQL=debug

spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

#ms.users.url=${USERS_URL:ms-users:8001/api/v1/user}
spring.cloud.kubernetes.secrets.enable-api=true
spring.cloud.kubernetes.discovery.all-namespaces=true